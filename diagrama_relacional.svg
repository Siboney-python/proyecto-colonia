<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <!-- Define styles -->
  <defs>
    <style>
      .table-box { fill: #f5f5f5; stroke: #333; stroke-width: 2; }
      .table-header { fill: #4a90e2; stroke: #333; stroke-width: 1; }
      .table-title { fill: white; font-weight: bold; font-size: 14px; font-family: Arial, sans-serif; }
      .table-content { fill: #f5f5f5; stroke: #333; stroke-width: 1; }
      .column-text { fill: #333; font-size: 12px; font-family: monospace; }
      .pk-marker { fill: #e74c3c; font-weight: bold; font-size: 11px; }
      .fk-marker { fill: #27ae60; font-weight: bold; font-size: 11px; }
      .relationship-line { stroke: #666; stroke-width: 2; fill: none; }
      .relationship-label { fill: #666; font-size: 11px; font-family: Arial, sans-serif; font-style: italic; }
      .legend-title { fill: #333; font-weight: bold; font-size: 13px; font-family: Arial, sans-serif; }
      .legend-text { fill: #333; font-size: 11px; font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="30" style="fill: #333; font-size: 18px; font-weight: bold; font-family: Arial; text-anchor: middle;">
    Diagrama Relacional — Sistema de Gestión de Colonias Felinas
  </text>

  <!-- Table: responsables -->
  <g>
    <!-- Header -->
    <rect x="50" y="80" width="280" height="30" class="table-header"/>
    <text x="190" y="102" class="table-title" text-anchor="middle">responsables</text>

    <!-- Content -->
    <rect x="50" y="110" width="280" height="150" class="table-content"/>
    <text x="60" y="130" class="column-text"><tspan class="pk-marker">PK</tspan> id: INTEGER</text>
    <text x="60" y="150" class="column-text">nombre: TEXT</text>
    <text x="60" y="170" class="column-text">telefono: TEXT</text>
    <text x="60" y="190" class="column-text">email: TEXT</text>
    <text x="60" y="210" class="column-text">identificacion: TEXT</text>
    <text x="60" y="230" class="column-text">tipo: TEXT</text>
    <text x="60" y="250" class="column-text">fecha_nacimiento: TEXT (nullable)</text>
  </g>

  <!-- Table: colonias -->
  <g>
    <!-- Header -->
    <rect x="360" y="80" width="280" height="30" class="table-header"/>
    <text x="500" y="102" class="table-title" text-anchor="middle">colonias</text>

    <!-- Content -->
    <rect x="360" y="110" width="280" height="130" class="table-content"/>
    <text x="370" y="130" class="column-text"><tspan class="pk-marker">PK</tspan> id: INTEGER</text>
    <text x="370" y="150" class="column-text">nombre: TEXT</text>
    <text x="370" y="170" class="column-text"><tspan class="fk-marker">FK</tspan> id_responsable: INTEGER</text>
    <text x="370" y="190" class="column-text">estado: TEXT</text>
    <text x="370" y="210" class="column-text">ultima_actualizacion: TEXT</text>
  </g>

  <!-- Table: gatos -->
  <g>
    <!-- Header -->
    <rect x="670" y="80" width="280" height="30" class="table-header"/>
    <text x="810" y="102" class="table-title" text-anchor="middle">gatos</text>

    <!-- Content -->
    <rect x="670" y="110" width="280" height="210" class="table-content"/>
    <text x="680" y="130" class="column-text"><tspan class="pk-marker">PK</tspan> id_gato: TEXT</text>
    <text x="680" y="150" class="column-text">nombre: TEXT</text>
    <text x="680" y="170" class="column-text">color: TEXT</text>
    <text x="680" y="190" class="column-text">sexo: TEXT</text>
    <text x="680" y="210" class="column-text">estado: TEXT</text>
    <text x="680" y="230" class="column-text">clinica_veterinaria: TEXT (nullable)</text>
    <text x="680" y="250" class="column-text">esterilizado: INTEGER</text>
    <text x="680" y="270" class="column-text">fecha_registro: TEXT</text>
    <text x="680" y="290" class="column-text"><tspan class="fk-marker">FK</tspan> id_colonia: INTEGER</text>
  </g>

  <!-- Relationships (arrows from responsables to colonias) -->
  <g>
    <!-- Line from responsables.id to colonias.id_responsable -->
    <path d="M 330 150 Q 345 150 360 150" class="relationship-line" marker-end="url(#arrowhead)"/>
    <text x="340" y="140" class="relationship-label">1:N</text>
  </g>

  <!-- Relationships (arrows from colonias to gatos) -->
  <g>
    <!-- Line from colonias.id to gatos.id_colonia -->
    <path d="M 640 150 Q 655 150 670 150" class="relationship-line" marker-end="url(#arrowhead)"/>
    <text x="650" y="140" class="relationship-label">1:N</text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g>
    <rect x="50" y="400" width="900" height="260" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>

    <text x="60" y="425" class="legend-title">Leyenda</text>

    <!-- PK explanation -->
    <text x="60" y="455" class="legend-text"><tspan class="pk-marker">PK</tspan> — Clave primaria: Identifica únicamente cada fila de la tabla.</text>
    <text x="80" y="475" class="legend-text">Cada tabla tiene una clave primaria. En <tspan style="font-weight: bold;">responsables</tspan> y <tspan style="font-weight: bold;">colonias</tspan>,</text>
    <text x="80" y="495" class="legend-text">se genera automáticamente. En <tspan style="font-weight: bold;">gatos</tspan>, es un identificador de 3 dígitos (texto).</text>

    <!-- FK explanation -->
    <text x="60" y="525" class="legend-text"><tspan class="fk-marker">FK</tspan> — Clave foránea: Columna que apunta a la clave primaria de otra tabla.</text>
    <text x="80" y="545" class="legend-text">Establece vínculos entre tablas y garantiza la integridad: no puedes insertar un gato</text>
    <text x="80" y="565" class="legend-text">con un <tspan style="font-family: monospace;">id_colonia</tspan> que no exista en la tabla <tspan style="font-weight: bold;">colonias</tspan>.</text>

    <!-- Relationships explanation -->
    <text x="60" y="595" class="legend-text"><tspan style="font-weight: bold;">1:N</tspan> — Relación uno a muchos: una responsable gestiona muchas colonias,</text>
    <text x="80" y="615" class="legend-text">y una colonia contiene muchos gatos. Cada gato pertenece a una sola colonia.</text>

    <!-- Constraints explanation -->
    <text x="60" y="645" class="legend-text"><tspan style="font-weight: bold;">PRAGMA foreign_keys = ON</tspan> — Activa las restricciones de clave foránea</text>
    <text x="80" y="665" class="legend-text">en SQLite. Debes ejecutar esta sentencia al abrir la conexión a la base de datos.</text>
  </g>
</svg>
